name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run cf:build

      # opennextjs-cloudflare deploy directement (pas "wrangler
      # deploy"): wrangler >=4.10x redirige lui-même vers cette
      # commande dès qu'il detecte open-next.config.ts, via un
      # sous-processus qui ne retrouve pas la config compilee
      # (erreur "Could not find compiled Open Next config"). On
      # appelle l'outil qui a construit le worker, sans intermediaire.
      - run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
