# ------------------------------------------------------------------
# IMPACT TECH — Configuration Cloudflare Worker (Hono, sans Next.js)
# Build  : npm run build   (Tailwind CSS + bundle client via esbuild)
# Deploy : npx wrangler deploy
#
# Variables/secrets a definir dans le dashboard (Settings > Variables
# and Secrets) ou via `wrangler secret put` :
#   - ADMIN_PASSWORD : mot de passe du dashboard admin (/admin)
#   - AUTH_SECRET    : chaine aleatoire longue pour signer les sessions
#   - NOTION_TOKEN   : jeton d'integration interne Notion (optionnel) —
#                      synchronise chaque demande de devis vers la base
#                      "CRM — Prospects & Clients". Sans ce secret, le
#                      formulaire fonctionne normalement (D1 seulement).
# ------------------------------------------------------------------
name = "impact-tech"
main = "src/worker.tsx"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "impact-tech-db"
database_id = "afaeac82-b728-4095-a4ff-a2053a5a9b55"

[observability]
enabled = true
